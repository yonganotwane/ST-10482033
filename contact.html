     CONTACT SECTION
============================= -->
<section class="container">

    <h1>Contact Us</h1>
    <p>Fill in the form below and our team will respond as soon as possible.</p>

    <form>

        <label for="fname">First Name</label>
        <input type="text" id="fname" name="firstname" placeholder="Enter your first name" required>

        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lastname" placeholder="Enter your last name" required>

        <label for="subject">Message</label>
        <textarea id="subject" name="subject" placeholder="Write your message here..." rows="6" required></textarea>

        <button type="submit">Send Message</button>

        <a class="btn" href="index.html" style="margin-top:10px; display:inline-block;">
            Back
        </a>

    </form>

</section>
