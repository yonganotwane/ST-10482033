<body>

<h1>Book a Service</h1>

<form>

    <h3>Customer Details</h3>
    <input type="text" placeholder="Full Name" required>
    <input type="tel" placeholder="Phone Number" required>

    <h3>Select Service</h3>
    <select id="service">
        <option>Engine Repair</option>
        <option>Brake Service</option>
        <option>Oil Change</option>
        <option>Towing</option>
    </select>

    <h3>Vehicle Condition</h3>
    <input type="radio" name="condition" value="movable" checked> I can bring my car<br>
    <input type="radio" name="condition" value="immobile"> Car cannot move<br>
    <input type="radio" name="condition" value="towing"> Need towing<br><br>

    <h3>Distance (KM)</h3>
    <input type="number" id="distance" placeholder="Enter distance">

    <h3>Available Time Slots</h3>
    <select>
        <option>09:00</option>
        <option>11:00</option>
        <option>13:00</option>
        <option>15:00</option>
    </select>

    <button type="button" onclick="calculate()">Submit Booking</button>

</form>

<p id="output"></p>
